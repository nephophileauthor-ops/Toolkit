name: Build Native Bridge

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/build-native-bridge.yml"
      - "app/src/main/cpp/**"
      - "app/src/main/go/tunbridge/**"
      - "app/src/main/java/com/apidebug/inspector/nativebridge/**"
      - "app/src/main/java/com/apidebug/inspector/capture/**"
      - "app/build.gradle.kts"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradlew"
      - "gradlew.bat"
      - "gradle/wrapper/**"
      - "docs/native-tun-bridge.md"

permissions:
  contents: read

jobs:
  build-native-bridge:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22.5"
          cache-dependency-path: app/src/main/go/tunbridge/go.mod

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "cmake;3.22.1" \
            "ndk;25.2.9519653"

      - name: Build Go bridge
        id: build_go_bridge
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p diagnostics
          LOG_FILE="$GITHUB_WORKSPACE/diagnostics/build-go-bridge.log"

          on_error() {
            local status=$?
            if [[ -f "$LOG_FILE" ]]; then
              tail -n 80 "$LOG_FILE" > "$GITHUB_WORKSPACE/diagnostics/build-go-bridge-tail.log"
              local summary
              summary="$(tail -n 20 "$LOG_FILE" | tr '\n' ' ' | sed 's/%/%25/g; s/\r/%0D/g')"
              echo "::error title=Build Go bridge failed::$summary"
            fi
            exit "$status"
          }

          trap on_error ERR

          {
            set -x
            go version
            go env
            test -d "$ANDROID_SDK_ROOT/ndk/25.2.9519653"
            ls -la "$ANDROID_SDK_ROOT/ndk/25.2.9519653"
            chmod +x app/src/main/go/tunbridge/build-android.sh
            cd app/src/main/go/tunbridge
            go mod download
            cd "$GITHUB_WORKSPACE"
            ANDROID_NDK_HOME="$ANDROID_SDK_ROOT/ndk/25.2.9519653" \
            app/src/main/go/tunbridge/build-android.sh
          } 2>&1 | tee "$LOG_FILE"

      - name: Sync Go bridge into Android app
        if: steps.build_go_bridge.outcome == 'success'
        run: |
          chmod +x app/src/main/go/tunbridge/sync-native-bridge.sh
          app/src/main/go/tunbridge/sync-native-bridge.sh

      - name: Build debug APK
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon assembleDebug

      - name: Prepare artifact layout
        run: |
          mkdir -p native-bridge-bundle/jniLibs/arm64-v8a
          mkdir -p native-bridge-bundle/jniLibs/x86_64
          mkdir -p native-bridge-bundle/cpp/include
          mkdir -p native-bridge-bundle/apk/debug
          mkdir -p native-bridge-bundle/diagnostics
          if [ -f app/src/main/go/tunbridge/build/android/arm64-v8a/libtunbridge.so ]; then
            cp app/src/main/go/tunbridge/build/android/arm64-v8a/libtunbridge.so native-bridge-bundle/jniLibs/arm64-v8a/libtunbridge.so
          fi
          if [ -f app/src/main/go/tunbridge/build/android/x86_64/libtunbridge.so ]; then
            cp app/src/main/go/tunbridge/build/android/x86_64/libtunbridge.so native-bridge-bundle/jniLibs/x86_64/libtunbridge.so
          fi
          if [ -f app/src/main/go/tunbridge/build/android/arm64-v8a/libtunbridge.h ]; then
            cp app/src/main/go/tunbridge/build/android/arm64-v8a/libtunbridge.h native-bridge-bundle/cpp/include/tunbridge.h
          fi
          cp app/build/outputs/apk/debug/app-debug.apk native-bridge-bundle/apk/debug/app-debug.apk
          cp docs/native-tun-bridge.md native-bridge-bundle/README-native-tun-bridge.md
          if [ -d diagnostics ]; then
            cp diagnostics/* native-bridge-bundle/diagnostics/ || true
          fi

      - name: Upload native bridge artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-bridge-bundle
          path: native-bridge-bundle
          if-no-files-found: error

      - name: Fail if Go bridge build failed
        if: steps.build_go_bridge.outcome != 'success'
        run: |
          echo "Go bridge build failed. Download the native-bridge-bundle artifact and inspect diagnostics/build-go-bridge.log."
          exit 1
